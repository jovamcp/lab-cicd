name: Pipeline CI

on:
  push:
    branches: [main]

jobs:
  pruebas:
    runs-on: ubuntu-latest
    steps:
      - name: Traer el codigo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Correr las pruebas
        run: pytest

      - name: Instalar herramientas de seguridad
        run: pip install pip-audit bandit

      - name: Escaneo de dependencias (SCA)
        run: pip-audit

      - name: Escaneo de codigo (SAST)
        run: bandit -r . --exclude ./test_calculadora.py

      - name: Empaquetar la aplicacion
        run: |
          mkdir -p entrega
          cp calculadora.py requirements.txt entrega/

      - name: Publicar el artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-calculadora
          path: entrega/